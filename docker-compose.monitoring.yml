# Monitoring stack for Borealis Fabrics
# Usage: docker-compose -f docker-compose.monitoring.yml up -d
#
# Services:
#   - Loki:       Log aggregation (port 3100)
#   - Prometheus:  Metrics scraping (port 9090)
#   - Grafana:     Dashboard visualization (port 3001)
#
# The backend pushes logs to Loki via pino-loki transport (set LOKI_HOST=http://localhost:3100).
# Prometheus scrapes /metrics from the backend at host.docker.internal:3000.

services:
  loki:
    image: grafana/loki:3.4.3
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started
    restart: unless-stopped

networks:
  default:
    external: true
    name: borealis-fabrics_default

volumes:
  loki_data:
  prometheus_data:
  grafana_data:
