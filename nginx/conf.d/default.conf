upstream backend {
    server nestjs:3000;
}

# HTTP server for domain -- redirect to HTTPS + serve ACME challenges
server {
    listen 80;
    server_name <DOMAIN>;

    # Let's Encrypt certificate renewal (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTP catch-all for IP direct access -- redirect to domain
server {
    listen 80 default_server;
    server_name _;
    return 301 https://<DOMAIN>$request_uri;
}

# HTTPS main server
server {
    listen 443 ssl http2;
    server_name <DOMAIN>;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    # TLS configuration (Mozilla Intermediate profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session caching
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # NOTE: Do NOT add ssl_stapling -- Let's Encrypt ended OCSP support (Aug 2025)

    # HSTS -- uncomment after verifying SSL works correctly (per D-11)
    # Phase 1: Test with short max-age
    # add_header Strict-Transport-Security "max-age=86400" always;
    # Phase 2: Production (after 1 day of testing)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy (/api/v1/*)
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File upload support (10MB max)
        client_max_body_size 10m;
    }

    # Health/ready/metrics endpoints (no /api prefix, excluded from globalPrefix)
    location ~ ^/(health|ready|metrics) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Cache static assets (JS, CSS, images, fonts) for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
