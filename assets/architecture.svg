<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="'Virgil', 'Segoe UI', sans-serif">
  <rect width="960" height="640" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#1e1e1e"/>
    </marker>
  </defs>

  <!-- User -->
  <ellipse cx="470" cy="70" rx="130" ry="30" fill="#fef3c7" stroke="#1e1e1e" stroke-width="2"/>
  <text x="470" y="76" text-anchor="middle" font-size="18" fill="#1e1e1e">WeChat Work / Browser</text>

  <!-- Frontend -->
  <rect x="300" y="160" width="340" height="80" rx="10" fill="#bae6fd" stroke="#1e1e1e" stroke-width="2"/>
  <text x="470" y="195" text-anchor="middle" font-size="18" fill="#1e1e1e">React 18 + Ant Design</text>
  <text x="470" y="220" text-anchor="middle" font-size="15" fill="#1e1e1e">(role-based admin / sales / warehouse)</text>

  <!-- Backend -->
  <rect x="280" y="310" width="380" height="140" rx="10" fill="#bbf7d0" stroke="#1e1e1e" stroke-width="2"/>
  <text x="470" y="345" text-anchor="middle" font-size="18" fill="#1e1e1e">NestJS 11 Modular Monolith</text>
  <text x="470" y="370" text-anchor="middle" font-size="15" fill="#1e1e1e">Fabric / Order (9-state) / Supplier</text>
  <text x="470" y="392" text-anchor="middle" font-size="15" fill="#1e1e1e">Customer / Quote / Logistics / Auth</text>
  <text x="470" y="420" text-anchor="middle" font-size="15" fill="#1e1e1e">Prisma ORM  +  Redis cache</text>

  <!-- MySQL -->
  <rect x="60" y="520" width="240" height="80" rx="10" fill="#e0e7ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="180" y="553" text-anchor="middle" font-size="18" fill="#1e1e1e">Tencent Cloud</text>
  <text x="180" y="575" text-anchor="middle" font-size="15" fill="#1e1e1e">MySQL (CDB)</text>

  <!-- Redis -->
  <rect x="340" y="520" width="260" height="80" rx="10" fill="#fecaca" stroke="#1e1e1e" stroke-width="2"/>
  <text x="470" y="553" text-anchor="middle" font-size="18" fill="#1e1e1e">Redis Cache</text>
  <text x="470" y="575" text-anchor="middle" font-size="15" fill="#1e1e1e">(TCE managed)</text>

  <!-- COS -->
  <rect x="640" y="520" width="240" height="80" rx="10" fill="#fbcfe8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="760" y="553" text-anchor="middle" font-size="18" fill="#1e1e1e">Tencent Cloud COS</text>
  <text x="760" y="575" text-anchor="middle" font-size="15" fill="#1e1e1e">(file storage)</text>

  <!-- Arrows -->
  <line x1="470" y1="100" x2="470" y2="160" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="470" y1="240" x2="470" y2="310" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="450" x2="200" y2="515" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="470" y1="450" x2="470" y2="515" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="560" y1="450" x2="740" y2="515" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
</svg>
